server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: stock-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://stock-postgres:5432/stock_selector}
    username: ${SPRING_DATASOURCE_USERNAME:stock_app}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
